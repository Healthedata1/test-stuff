language: en
text:
  status: generated
  div: >-
    <div xmlns="http://www.w3.org/1999/xhtml"><p
    class="res-header-id"><b>Generated Narrative: OperationDefinition
    bulk-submit</b></p><a name="bulk-submit"> </a><a name="hcbulk-submit">
    </a><p>URL: [base]/$bulk-submit</p><h3>Parameters</h3><table
    class="grid"><tr><td><b>Use</b></td><td><b>Name</b></td><td><b>Scope</b></td><td><b>Cardinality</b></td><td><b>Type</b></td><td><b>Binding</b></td><td><b>Documentation</b></td></tr><tr><td>IN</td><td>submitter</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#Identifier">Identifier</a></td><td/><td><div><p>The
    submitter must match a system and code specified by the Data Consumer
    (coordinated out-of-band or in an implementation guide specific to a use
    case).</p>

    </div></td></tr><tr><td>IN</td><td>submissionId</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td><div><p>The
    value must be unique for the <code>submitter</code>.</p>

    </div></td></tr><tr><td>IN</td><td>submissionStatus</td><td/><td>0..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#Coding">Coding</a></td><td/><td><div><p>System
    of <code>http://hl7.org/fhir/uv/bulkdata/ValueSet/submission-status</code>,
    code of <code>in-progress</code> (default if parameter is omitted),
    <code>complete</code> or <code>aborted</code>. Once a request has been
    submitted with a <code>submissionStatus</code> of <code>aborted</code> or
    <code>complete</code>, no additional requests may be submitted for that
    <code>submitter</code> and <code>submissionId</code> combination. At least
    one of the <code>submissionStatus</code> and <code>manifestUrl</code>
    parameters SHALL be populated.</p>

    </div></td></tr><tr><td>IN</td><td>manifestUrl</td><td/><td>0..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#url">url</a></td><td/><td><div><p>Url
    pointing to a <a
    href="https://build.fhir.org/ig/HL7/bulk-data/export.html#response---output-manifest">Bulk
    Export Manifest</a> with a pre-coordinated FHIR data set. Files in multiple
    submitted manifests with the same <code>submitter</code> and
    <code>submissionId</code> SHALL be treated by the Data Consumer as if they
    were submitted in a single manifest. This parameter MAY be omitted when the
    operation is being called to set the submissionStatus to
    <code>complete</code> or <code>aborted</code>. The value must be unique for
    all manifests that share a <code>submitter</code> and
    <code>submissionId</code> combination. At least one of the
    <code>submissionStatus</code> and <code>manifestUrl</code> parameters SHALL
    be populated. When this parameter is populated, the <code>fhirBaseUrl</code>
    parameter SHALL also be populated.</p>

    </div></td></tr><tr><td>IN</td><td>replacesManifestUrl</td><td/><td>0..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#url">url</a></td><td/><td><div><p>The
    url of a previously submitted manifest that has the same
    <code>submissionId</code> and <code>submitter</code> as this request. When
    provided, Data Consumer SHALL replace the data in the referenced manifest
    with the one in the current request. If the url is invalid or the Data
    Consumer is unable to replace the data, it should respond to the request
    with an OperationOutcome describing the error.</p>

    </div></td></tr><tr><td>IN</td><td>outputFormat</td><td/><td>0..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td><div><p>The
    format for the Bulk Data files in the manifest. The MIME-type MAY include a
    MIME-type parameter of <code>fhirVersion</code> as described in the <a
    href="https://hl7.org/fhir/http.html#version-parameter">FHIR
    specification</a> to indicate which version of FHIR the resources in the
    Bulk Data files are based on. When omitted, defaults to
    <code>application/fhir+ndjson</code> (Newline Delimited JSON) with a version
    of FHIR determined by the Data Consumer. All of the resources in a
    submission SHALL use the same version of FHIR.</p>

    </div></td></tr><tr><td>IN</td><td>fhirBaseUrl</td><td/><td>0..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#url">url</a></td><td/><td><div><p>Base
    url to be used by the Data Consumer when resolving relative references in
    the submitted resources. When the <code>manifestUrl</code> parameter is
    populated, this parameter SHALL be populated.</p>

    </div></td></tr><tr><td>IN</td><td>fileRequestHeader</td><td/><td>0..*</td><td/><td/><td><div><p>HTTP
    headers that the Data Consumer should use when requesting a data file from
    the Data Provider.</p>

    </div></td></tr><tr><td>IN</td><td>fileRequestHeader.headerName</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td/></tr><tr><td>IN</td><td>fileRequestHeader.headerValue</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td/></tr><tr><td>IN</td><td>oauthMetadataUrl</td><td/><td>0..*</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#url">url</a></td><td/><td><div><p>Location
    that a Data Consumer can use to obtain the information needed to retrieve
    files protected using OAuth 2.0. The url SHALL be the path to a <a
    href="https://hl7.org/fhir/smart-app-launch/conformance.html#using-well-known">FHIR
    Authorization Endpoint and Capabilities Discovery file</a> or another <a
    href="https://datatracker.ietf.org/doc/rfc9728/">OAuth 2.0 Protected
    Resource Metadata file</a> that is registered in the <a
    href="https://www.iana.org/assignments/well-known-uris/well-known-uris.xhtml">IANA
    Well-Known URIs Registry</a>.</p>

    </div></td></tr><tr><td>IN</td><td>fileEncryptionKey</td><td/><td>0..1</td><td/><td/><td><div><p>Encryption
    key information for the Data Consumer to decrypt retrieved data files from
    the Data Provider.</p>

    </div></td></tr><tr><td>IN</td><td>fileEncryptionKey.coding</td><td/><td>0..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#Coding">Coding</a></td><td/><td><div><p>If
    omitted, defaults to a system of
    <code>http://hl7.org/fhir/uv/bulkdata/ValueSet/file-encryption-type</code>
    and code of <code>jwe</code>.</p>

    </div></td></tr><tr><td>IN</td><td>fileEncryptionKey.value</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td><div><p>For
    the system of <code>file-encryption-type</code> and code of
    <code>jwe</code>, populate with the JSON Web Encryption structure to deliver
    a Content Encryption Key for the Data Consumer to decrypt retrieved data
    files from the Data Provider.</p>

    </div></td></tr><tr><td>IN</td><td>metadata</td><td/><td>0..1</td><td/><td/><td><div><p>Child
    parameters can be added under this parameter to pass pre-coordinated data
    relevant to the submission from the Data Provider to the Data Consumer. Each
    child parameter name SHALL be an absolute URL. Specific child parameters are
    defined in implementation guides for particular use cases.</p>

    </div></td></tr><tr><td>IN</td><td>metadata.parameterUrl</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#uri">uri</a></td><td/><td><div><p>An
    absolute URL identifying this metadata parameter.</p>

    </div></td></tr><tr><td>IN</td><td>metadata.parameterValue</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td><div><p>The
    value for this metadata parameter.</p>

    </div></td></tr><tr><td>IN</td><td>import</td><td/><td>0..1</td><td/><td/><td><div><p>Child
    parameters can be added under this parameter to pass pre-coordinated options
    relevant to how the data will be processed from the Data Provider to the
    Data Consumer. For example, a Data Consumer may allow the Data Provider to
    specify whether or not existing data should be replaced with the data in the
    submission. Each child parameter name SHALL be an absolute URL. Specific
    child parameters are defined in implementation guides for particular use
    cases.</p>

    </div></td></tr><tr><td>IN</td><td>import.parameterUrl</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#uri">uri</a></td><td/><td><div><p>An
    absolute URL identifying this import parameter.</p>

    </div></td></tr><tr><td>IN</td><td>import.parameterValue</td><td/><td>1..1</td><td><a
    href="http://hl7.org/fhir/R4/datatypes.html#string">string</a></td><td/><td><div><p>The
    value for this import parameter.</p>

    </div></td></tr></table></div>
